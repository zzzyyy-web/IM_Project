services:
  im-backend:
    build:
      context: ../source/backend
      dockerfile: Dockerfile
    image: im-backend:latest
    container_name: im-backend
    ports:
      - "8000:8000"
    environment:
      IM_SECRET_KEY: change-this-secret-before-production
      IM_DB_PATH: /app/data/im.sqlite3
      IM_ATTACHMENT_DIR: /app/data/uploads
    volumes:
      - ./data/im-backend:/app/data
    restart: unless-stopped
